services:
  - type: web
    name: ikwee
    env: python
    repo: https://github.com/Ogak-AI/Ikwee
    region: oregon
    plan: free
    healthCheckPath: /health
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
      # Uncomment and link a Render Postgres database when ready to upgrade from SQLite
      # - key: DATABASE_URL
      #   fromDatabase:
      #     name: ikwee-db
      #     property: connectionString

# To add a managed Postgres DB on Render, uncomment this block:
# databases:
#   - name: ikwee-db
#     plan: free
