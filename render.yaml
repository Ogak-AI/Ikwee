services:
  - type: web
    name: ikwee-learning-platform
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.0"
      - key: AT_USERNAME
        sync: false
      - key: AT_API_KEY
        sync: false
